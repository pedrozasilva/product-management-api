services:
  # PHP-FPM 8.4 (dev stage)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: pma-app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - pma-network
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx
  nginx:
    image: nginx:stable-alpine
    container_name: pma-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pma-network
    depends_on:
      - app

  # PostgreSQL
  postgres:
    image: postgres:17-alpine
    container_name: pma-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-example_app}
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pma-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    networks:
      - pma-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-root} -d ${DB_DATABASE:-example_app}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pma-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pma-pgadmin:/var/lib/pgadmin
    networks:
      - pma-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pma-pgdata:
    driver: local
  pma-pgadmin:
    driver: local

networks:
  pma-network:
    driver: bridge
